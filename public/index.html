<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suivi des réservations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --brand: #163667;
        --ink: #0b132b;
        --muted: #6b7280;
        --bg: #f4f7fb;
        --card: #ffffff;
        --line: #e5e7eb;
        --primary:#0284c7; --green:#16a34a; --red:#dc2626;
        /* Dynamic theme variables */
        --color-primary: #cccccc;
        --color-primary-dark: #999999;
        --color-secondary: #FFFFFF;
        --color-accent: #999999;
        --color-background: #F5F5F5;
        --color-text-on-primary: #333333;
      }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background-color: var(--bg);
        color: var(--ink);
      }
      .table-wrap{overflow-x:auto}
      .hscroll{height:16px;background:#0b132b;border-radius:8px;margin:8px 0;position:relative}
      .hscroll .thumb{position:absolute;top:2px;left:2px;height:12px;width:200px;background:#374151;border-radius:6px;cursor:grab}
      .th-sortable{cursor:pointer; user-select:none; position:relative}
      .sort-indicator{position:absolute; right:8px; top:50%; transform:translateY(-50%); font-size:12px; opacity:.7}

      .menu-wrap{ position:relative; display:inline-block; }
      .btn-more{
        background: var(--brand);
        color:#fff;
        border:1px solid var(--brand);
        border-radius:10px; padding:10px 14px; font-weight:700;
        box-shadow:0 6px 14px rgba(0,0,0,.06);
        transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
      }
      .btn-more:hover{ opacity:.96; box-shadow:0 10px 22px rgba(0,0,0,.10); }
      .btn-more:active{ transform: translateY(1px); }

      .menu-panel{
        position:absolute; right:0; top:calc(100% + 8px);
        background:#fff; border:1px solid var(--line); border-radius:12px;
        box-shadow:0 18px 40px rgba(0,0,0,.16);
        min-width:240px; padding:8px; display:none; z-index:10000;
      }
      .menu-panel.open{ display:block; }
      .menu-item{
        display:flex; align-items:center; gap:8px;
        width:100%; border:0; background:transparent; text-align:left; cursor:pointer;
        padding:12px 12px; border-radius:10px; font-weight:600; color:#111827;
      }
      .menu-item:hover{ background:#f3f4f6; }
      .menu-item.danger{ color:#b91c1c; }
      .menu-item.danger:hover{ background:#fee2e2; }
      .menu-sep{ height:1px; background:var(--line); margin:6px 0; }

      #fab-add{
        position: fixed; right: 18px; bottom: 18px; z-index: 1000;
        width: 56px; height: 56px; border-radius: 50%;
        background: var(--brand); color:#fff; border: 0; font-size: 28px; line-height: 0;
        display:flex; align-items:center; justify-content:center;
        box-shadow: 0 10px 22px rgba(0,0,0,.18);
        cursor: pointer;
      }
      #fab-add:hover{ opacity:.95; }
      #fab-add:active{ transform: translateY(1px); }

      input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; transition: opacity 0.2s; }
      input[type="date"]::-webkit-calendar-picker-indicator:hover { opacity: 1; }

      /* Styles personnalisés pour l'impression du calendrier */
      .print-priv { font-size: 8pt; }
      
      @media print {
        body.print-table-only, body.print-table-only #root { padding: 0; margin: 0; }
        body.print-table-only header,
        body.print-table-only .kpis,
        body.print-table-only .detail,
        body.print-table-only .panel-controls,
        body.print-table-only .backdrop,
        body.print-table-only .back-link,
        body.print-table-only #fab-add { display:none !important; }
        body.print-table-only main { padding-top: 0 !important; }
        body.print-table-only main > .panel { display:none; }
        body.print-table-only main > section { display: none !important; }
        body.print-table-only #print-calendar-panel { display:block !important; }
        body.print-table-only { background:#fff; }
        
        /* Calendrier d'impression - 1 page A4 paysage */
        #print-calendar-panel { width: 100%; margin: 0; padding: 3mm; background: #fff; }
        #print-calendar-panel h1 { margin: 0 0 1mm 0; font-size: 16pt; color: #163667; font-weight: bold; line-height: 1.2; }
        #print-calendar-panel p { margin: 0; font-size: 10pt; color: #666; }
        #print-calendar-panel .grid { width: 100%; display: grid; grid-template-columns: repeat(7, 1fr); gap: 0; }
        #print-calendar-panel .grid > div { 
          border: 0.5pt solid #999; 
          padding: 3mm; 
          font-size: 14pt !important;
          page-break-inside: avoid;
          background: #fff;
          overflow: hidden;
          min-height: 120mm;
        }
        #print-calendar-panel .grid > div:nth-child(1),
        #print-calendar-panel .grid > div:nth-child(2),
        #print-calendar-panel .grid > div:nth-child(3),
        #print-calendar-panel .grid > div:nth-child(4),
        #print-calendar-panel .grid > div:nth-child(5),
        #print-calendar-panel .grid > div:nth-child(6),
        #print-calendar-panel .grid > div:nth-child(7) {
          background: #163667;
          color: #fff;
          font-weight: bold;
          text-align: center;
          padding: 1.5mm 1mm;
          font-size: 10pt;
        }
        #print-calendar-panel div > div:first-child { font-weight: bold; color: #333; margin-bottom: 0.5mm; font-size: 10pt !important; }
        #print-calendar-panel div > div:not(:first-child) { 
          font-size: 14pt !important; 
          line-height: 1.4;
          margin-bottom: 0.5mm;
          white-space: normal;
          word-wrap: break-word;
        }
        /* Classe personnalisée pour agrandir le texte des privat */
        .print-text-lg { font-size: 14pt !important; }
      }
      @page { size: A4 landscape; margin: 6mm; }
    </style>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
