
<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suivi des réservations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --brand: #163667;
        --ink: #0b132b;
        --muted: #6b7280;
        --bg: #f4f7fb;
        --card: #ffffff;
        --line: #e5e7eb;
        --primary:#0284c7; --green:#16a34a; --red:#dc2626;
        /* Dynamic theme variables */
        --color-primary: #cccccc;
        --color-primary-dark: #999999;
        --color-secondary: #FFFFFF;
        --color-accent: #999999;
        --color-background: #F5F5F5;
        --color-text-on-primary: #333333;
      }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background-color: var(--bg);
        color: var(--ink);
      }
      .table-wrap{overflow-x:auto}
      .hscroll{height:16px;background:#0b132b;border-radius:8px;margin:8px 0;position:relative}
      .hscroll .thumb{position:absolute;top:2px;left:2px;height:12px;width:200px;background:#374151;border-radius:6px;cursor:grab}
      .th-sortable{cursor:pointer; user-select:none; position:relative}
      .sort-indicator{position:absolute; right:8px; top:50%; transform:translateY(-50%); font-size:12px; opacity:.7}

      .menu-wrap{ position:relative; display:inline-block; }
      .btn-more{
        background: var(--brand);
        color:#fff;
        border:1px solid var(--brand);
        border-radius:10px; padding:10px 14px; font-weight:700;
        box-shadow:0 6px 14px rgba(0,0,0,.06);
        transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
      }
      .btn-more:hover{ opacity:.96; box-shadow:0 10px 22px rgba(0,0,0,.10); }
      .btn-more:active{ transform: translateY(1px); }

      .menu-panel{
        position:absolute; right:0; top:calc(100% + 8px);
        background:#fff; border:1px solid var(--line); border-radius:12px;
        box-shadow:0 18px 40px rgba(0,0,0,.16);
        min-width:240px; padding:8px; display:none; z-index:10000;
      }
      .menu-panel.open{ display:block; }
      .menu-item{
        display:flex; align-items:center; gap:8px;
        width:100%; border:0; background:transparent; text-align:left; cursor:pointer;
        padding:12px 12px; border-radius:10px; font-weight:600; color:#111827;
      }
      .menu-item:hover{ background:#f3f4f6; }
      .menu-item.danger{ color:#b91c1c; }
      .menu-item.danger:hover{ background:#fee2e2; }
      .menu-sep{ height:1px; background:var(--line); margin:6px 0; }

      #fab-add{
        position: fixed; right: 18px; bottom: 18px; z-index: 1000;
        width: 56px; height: 56px; border-radius: 50%;
        background: var(--brand); color:#fff; border: 0; font-size: 28px; line-height: 0;
        display:flex; align-items:center; justify-content:center;
        box-shadow: 0 10px 22px rgba(0,0,0,.18);
        cursor: pointer;
      }
      #fab-add:hover{ opacity:.95; }
      #fab-add:active{ transform: translateY(1px); }

      /* Custom styles for date input */
      input[type="date"]::-webkit-calendar-picker-indicator {
        cursor: pointer;
        opacity: 0.6;
        transition: opacity 0.2s;
      }
      input[type="date"]::-webkit-calendar-picker-indicator:hover {
        opacity: 1;
      }

      @media print {
        body.print-table-only, body.print-table-only #root {
          padding: 0;
          margin: 0;
        }
        body.print-table-only header,
        body.print-table-only .kpis,
        body.print-table-only .detail,
        body.print-table-only .panel-controls,
        body.print-table-only .backdrop,
        body.print-table-only .back-link,
        body.print-table-only #fab-add {
           display:none !important; 
        }
        body.print-table-only main { padding-top: 0 !important; }
        body.print-table-only main > .panel { display:none; }
        body.print-table-only #print-panel { display:block !important; border:none; box-shadow:none; padding: 0 !important; }
        body.print-table-only { background:#fff; }
        #print-panel table { page-break-inside:auto; width: 100% !important; table-layout: fixed !important; border-collapse: collapse !important; }
        #print-panel thead { display:table-header-group }
        #print-panel tfoot { display:table-footer-group }
         #print-panel thead th,
        #print-panel tbody td,
        #print-panel tfoot td {
          padding: 4px !important;
          font-size: 9px !important;
          white-space: normal !important;
          word-break: break-word !important;
          hyphens: auto !important;
          vertical-align: top;
          border: 1px solid #ccc;
        }
        #print-panel .table-wrap { overflow: visible !important; }
        #print-panel thead th:last-child,
        #print-panel tbody td:last-child { 
          display: none !important; 
        }
        #print-panel tfoot td[colspan="4"] {
            display: none !important;
        }
      }
      @page { size: A4 landscape; margin: 12mm; }
    </style>
    <style>
      /* Impression: utilitaires */
      .print-only { display: none; }
      @media print {
        .print-only { display: block !important; text-align: center; margin: 0 0 8mm 0; }
        /* Centrer le panneau d'impression et le tableau, éviter la coupure horizontale */
        #print-panel { margin: 0 auto !important; }
        #print-panel table { min-width: auto !important; width: 100% !important; margin: 0 auto !important; table-layout: fixed !important; }
      }
    </style>
    <style>
      /* Styles V4 pour la vue Tableau */
      .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin:12px 0}
      .toolbar{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin:10px 0 0}
      .btn{border:1px solid var(--line);background:#fff;padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:8px}
      .btn.primary{ background:var(--brand); color:#fff; border-color:var(--brand); }
      .btn.green{ background:var(--green); color:#fff; border-color:var(--green); }
      .btn.red{ background:var(--red); color:#fff; border-color:var(--red); }
    </style>
    <link rel="icon" type="image/jpg" href="/UwFsj.jpg" />
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
